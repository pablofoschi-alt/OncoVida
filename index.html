<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Bienestar - OncoVida</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide-react@latest/dist/umd/lucide-react.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const { Plus, Bell, BarChart3, Calendar, Heart, Pill, Smile, TrendingUp, X, Save } = lucideReact;

    const STORAGE_KEYS = {
      symptoms: 'onco_sintomas',
      mood: 'onco_animo',
      medications: 'onco_meds',
      reminders: 'onco_reminders'
    };

    function App() {
      const [screen, setScreen] = useState('home');
      const [symptoms, setSymptoms] = useState(JSON.parse(localStorage.getItem(STORAGE_KEYS.symptoms) || '[]'));
      const [mood, setMood] = useState(JSON.parse(localStorage.getItem(STORAGE_KEYS.mood) || '[]'));
      const [medications, setMedications] = useState(JSON.parse(localStorage.getItem(STORAGE_KEYS.medications) || '[]'));
      const [reminders, setReminders] = useState(JSON.parse(localStorage.getItem(STORAGE_KEYS.reminders) || '[]'));
      const [showModal, setShowModal] = useState(false);
      const [modalType, setModalType] = useState('');

      useEffect(() => { localStorage.setItem(STORAGE_KEYS.symptoms, JSON.stringify(symptoms)); }, [symptoms]);
      useEffect(() => { localStorage.setItem(STORAGE_KEYS.mood, JSON.stringify(mood)); }, [mood]);
      useEffect(() => { localStorage.setItem(STORAGE_KEYS.medications, JSON.stringify(medications)); }, [medications]);
      useEffect(() => { localStorage.setItem(STORAGE_KEYS.reminders, JSON.stringify(reminders)); }, [reminders]);

      const addSymptom = (level, note) => {
        setSymptoms([{id: Date.now(), date: new Date().toLocaleDateString('es-AR'), level, note},...symptoms]);
        setShowModal(false);
      };

      const addMood = (level, note) => {
        setMood([{id: Date.now(), date: new Date().toLocaleDateString('es-AR'), level, note},...mood]);
        setShowModal(false);
      };

      const addMedication = (name, time) => {
        setMedications([{id: Date.now(), name, time, taken: false},...medications]);
        setShowModal(false);
      };

      const toggleMed = (id) => {
        setMedications(medications.map(m => m.id === id? {...m, taken:!m.taken} : m));
      };

      if (screen === 'home') {
        return (
          <div className="min-h-screen bg-gradient-to-br from-blue-50 to-purple-50 p-4">
            <div className="max-w-md mx-auto">
              <h1 className="text-3xl font-bold text-center mb-2 mt-4 text-gray-800">Mi Bienestar 💙</h1>
              <p className="text-center text-gray-600 mb-6">Tu compañero diario</p>

              <div className="grid grid-cols-2 gap-4 mb-6">
                <button onClick={() => setScreen('sintomas')} className="bg-white p-6 rounded-2xl shadow-md hover:shadow-xl transition-all">
                  <TrendingUp className="w-10 h-10 text-blue-500 mb-3 mx-auto" />
                  <div className="font-bold text-gray-700">Síntomas</div>
                  <div className="text-sm text-gray-500">{symptoms.length} registros</div>
                </button>
                <button onClick={() => setScreen('animo')} className="bg-white p-6 rounded-2xl shadow-md hover:shadow-xl transition-all">
                  <Smile className="w-10 h-10 text-yellow-500 mb-3 mx-auto" />
                  <div className="font-bold text-gray-700">Ánimo</div>
                  <div className="text-sm text-gray-500">{mood.length} registros</div>
                </button>
                <button onClick={() => setScreen('meds')} className="bg-white p-6 rounded-2xl shadow-md hover:shadow-xl transition-all">
                  <Pill className="w-10 h-10 text-green-500 mb-3 mx-auto" />
                  <div className="font-bold text-gray-700">Medicamentos</div>
                  <div className="text-sm text-gray-500">{medications.length} activos</div>
                </button>
                <button onClick={() => setScreen('record')} className="bg-white p-6 rounded-2xl shadow-md hover:shadow-xl transition-all">
                  <Bell className="w-10 h-10 text-purple-500 mb-3 mx-auto" />
                  <div className="font-bold text-gray-700">Recordatorios</div>
                  <div className="text-sm text-gray-500">{reminders.length} activos</div>
                </button>
              </div>
            </div>
          </div>
        );
      }
